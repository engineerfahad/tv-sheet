<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sheet Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: auto;
      padding: 10px;
    }

    #status {
      position: fixed;
      top: 10px;
      right: 14px;
      font-size: 12px;
      color: #aaa;
      z-index: 999;
    }

    #status span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00e676;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #table-container {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
    }

    thead tr {
      background: #16213e;
      color: #00e5ff;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    th, td {
      padding: 12px 16px;
      border: 1px solid #2a2a4a;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: #16213e;
    }

    tbody tr:nth-child(odd) {
      background: #1a1a2e;
    }

    tbody tr:hover {
      background: #0f3460;
    }

    #error {
      display: none;
      color: #ff5252;
      padding: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div id="status"><span></span>LIVE</div>
  <div id="error">⚠️ Could not load sheet. Check if the sheet is shared publicly.</div>
  <div id="table-container">
    <table id="sheet-table">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const SHEET_ID = "1uqQ5ZptptX1u-kPef9A0w1wrRzUmCQw2gtuXfRjIb1k";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=`;
    const REFRESH_MS = 5000;

    function parseCSV(text) {
      const rows = [];
      const lines = text.split(/\r?\n/);
      for (let line of lines) {
        if (!line.trim()) continue;
        const cols = [];
        let cur = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuote = !inQuote;
          } else if (ch === ',' && !inQuote) {
            cols.push(cur); cur = '';
          } else {
            cur += ch;
          }
        }
        cols.push(cur);
        rows.push(cols);
      }
      return rows;
    }

    function renderTable(rows) {
      const thead = document.getElementById('thead');
      const tbody = document.getElementById('tbody');
      if (!rows.length) return;

      thead.innerHTML = '<tr>' + rows[0].map(h => `<th>${h}</th>`).join('') + '</tr>';
      tbody.innerHTML = rows.slice(1).map(row =>
        '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>'
      ).join('');
    }

    async function fetchSheet() {
      try {
        const res = await fetch(CSV_URL + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('Network error');
        const text = await res.text();
        const rows = parseCSV(text);
        renderTable(rows);
        document.getElementById('error').style.display = 'none';
      } catch (e) {
        document.getElementById('error').style.display = 'block';
        console.error(e);
      }
    }

    fetchSheet();
    setInterval(fetchSheet, REFRESH_MS);
  </script>

</body>
</html>
