<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sheet Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Invisible flash overlay to indicate refresh without flicker */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.15s ease;
    }
    #flash.active {
      opacity: 0.08;
    }
  </style>
</head>
<body>

  <div id="flash"></div>

  <iframe
    id="sheet"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShI2MKFXV6YtdHl4_qS227nDH-ezhXJu4mNoBriAJWwrMmknp1rF95CqbjpoKEKfxaixOcXVPvCgD2/pubhtml?widget=true&headers=false"
    allowfullscreen
  ></iframe>

  <script>
    const REFRESH_INTERVAL = 5000; // 5 seconds
    const sheet = document.getElementById('sheet');
    const flash = document.getElementById('flash');
    const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShI2MKFXV6YtdHl4_qS227nDH-ezhXJu4mNoBriAJWwrMmknp1rF95CqbjpoKEKfxaixOcXVPvCgD2/pubhtml?widget=true&headers=false";

    function refreshSheet() {
      // Subtle flash to indicate refresh
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);

      // Reload iframe with cache-buster so it fetches fresh data
      sheet.src = BASE_URL + "&t=" + Date.now();
    }

    setInterval(refreshSheet, REFRESH_INTERVAL);
  </script>

</body>
</html>
